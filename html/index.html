<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LANDOKMAI — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,system-ui;margin:0;background:#fff;color:#1e293b}
    .wrap{max-width:900px;margin:24px auto;padding:0 16px}
    h2{margin:16px 0}
    .card{border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:20px}
    label{display:block;margin:8px 0 4px}
    input,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px}
    button{margin-top:12px;padding:12px;border:0;border-radius:10px;background:#0f2f45;color:#fff;font-weight:600;cursor:pointer}
    .row{display:flex;gap:10px;align-items:center}
    .list{margin-top:8px}
    .item{border:1px solid #e5e7eb;border-radius:10px;padding:10px;margin:6px 0;display:flex;justify-content:space-between;gap:8px}
    a{color:#0f2f45;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>LANDOKMAI — Admin</h1>
    <div class="card">
      <h2>เพิ่มสินค้า</h2>
      <label>ชื่อไทย</label><input id="f_name_th">
      <label>ชื่ออังกฤษ</label><input id="f_name_en">
      <label>ราคา</label><input id="f_price" type="number" step="0.01">
      <label>รูปภาพ URL</label><input id="f_img">
      <label>รายละเอียด</label><textarea id="f_desc" rows="3"></textarea>
      <button id="btnAddFlower">บันทึกสินค้า</button>
      <div class="list" id="flowerList"></div>
    </div>
    <section class="card" style="margin-top:16px">
      <h2>เขียนบล็อก</h2>
      <input id="b_title" placeholder="หัวเรื่อง" style="width:100%;padding:.6rem;margin:.3rem 0">
      <input id="b_cover" placeholder="ภาพหน้าปก (URL)" style="width:100%;padding:.6rem;margin:.3rem 0">
      <textarea id="b_content" rows="6" placeholder="เนื้อหา" style="width:100%;padding:.6rem;margin:.3rem 0"></textarea>
      <button id="b_post">เผยแพร่</button>
      <div id="b_msg" style="margin-top:.5rem;color:#0a7"></div>

      <h3 style="margin-top:18px">บทความล่าสุด</h3>
      <div class="list" id="blogList"></div>
    </section>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const api = (u, opt = {}) => fetch(u, Object.assign({ headers: { 'Content-Type': 'application/json' } }, opt));

    $('#btnAddFlower').addEventListener('click', async () => {
      const body = {
        name_th: $('#f_name_th').value.trim(),
        name_en: $('#f_name_en').value.trim(),
        price: Number($('#f_price').value || 0),
        image_url: $('#f_img').value.trim(),
        description: $('#f_desc').value.trim()
      };
      const r = await api('/api/admin/flowers', { method: 'POST', body: JSON.stringify(body) });
      const d = await r.json();
      alert(d.message || (r.ok ? 'สำเร็จ' : 'ไม่สำเร็จ'));
      if (r.ok) loadFlowers();
    });

    async function loadFlowers() {
      const r = await fetch('/api/flowers');
      const items = await r.json();
      $('#flowerList').innerHTML = items.slice(0, 8).map(x => `
        <div class="item">
          <div>${x.name_th} — ฿${Number(x.price).toLocaleString()}</div>
          <button data-del="${x.id}" style="background:#ef4444">ลบ</button>
        </div>
      `).join('');
      document.querySelectorAll('button[data-del]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('ลบสินค้านี้?')) return;
          const r = await api('/api/admin/flowers/' + btn.dataset.del, { method: 'DELETE' });
          const d = await r.json(); alert(d.message || '');
          loadFlowers();
        });
      });
    }

    $('#b_post').addEventListener('click', async () => {
      const body = {
        title: $('#b_title').value.trim(),
        cover_url: $('#b_cover').value.trim(),
        content: $('#b_content').value.trim()
      };
      if (!body.title || !body.content) { alert('กรอกหัวเรื่องและเนื้อหา'); return; }
      const r = await api('/api/admin/blogs', { method: 'POST', body: JSON.stringify(body) });
      const d = await r.json();
      if (r.ok) {
        $('#b_msg').textContent = 'เผยแพร่แล้ว';
        $('#b_title').value = ''; $('#b_cover').value = ''; $('#b_content').value = '';
        loadBlogs();
      } else {
        alert(d.message || 'server_error');
      }
    });

    async function loadBlogs() {
      const r = await fetch('/api/blogs');
      const items = await r.json();
      $('#blogList').innerHTML = items.map(x => `
        <div class="item">
          <div>
            <a href="/blogs?slug=${encodeURIComponent(x.slug)}" target="_blank">${x.title}</a> — โดย ${x.author}
          </div>
          <div class="row">
            <button data-edit="${x.slug}">แก้ไข</button>
            <button data-delid="${x.id}" style="background:#ef4444">ลบ</button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('button[data-delid]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('ลบบทความนี้?')) return;
          const r = await api('/api/admin/blogs/' + btn.dataset.delid, { method: 'DELETE' });
          const d = await r.json(); alert(d.message || '');
          loadBlogs();
        });
      });

      document.querySelectorAll('button[data-edit]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const slug = btn.dataset.edit;
          const r = await fetch('/api/blogs/' + slug);
          const post = await r.json();
          if (post.message === 'not_found') return alert('ไม่พบบทความ');
          const newTitle = prompt('แก้ไขหัวเรื่อง', post.title); if (!newTitle) return;
          const newCover = prompt('แก้ไขรูปปก URL', post.cover_url || '') ?? '';
          const newContent = prompt('แก้ไขเนื้อหา', post.content) ?? post.content;
          const rr = await api('/api/admin/blogs/' + post.id, {
            method: 'PUT',
            body: JSON.stringify({ title: newTitle, cover_url: newCover, content: newContent })
          });
          const dd = await rr.json(); alert(dd.message || '');
          loadBlogs();
        });
      });
    }

    const logoutBtn = $('#logout');
    if (logoutBtn) logoutBtn.addEventListener('click', async () => {
      await api('/api/auth/logout', { method: 'POST' }); location.href = '/login';
    });

    loadFlowers();
    loadBlogs();
  </script>
</body>
</html>
