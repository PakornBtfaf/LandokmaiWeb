<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — LANDOKMAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body{
      font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:#f7fafc;margin:0
    }
    .wrap{
      max-width:420px;margin:4rem auto;background:#fff;
      border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.07);padding:2rem
    }
    h1{margin:0 0 1rem;font-weight:600}
    h2{margin:1.5rem 0 .75rem;font-size:1.1rem}
    label{display:block;margin:.75rem 0 .25rem}
    input{
      width:100%;padding:.8rem;border:1px solid #e5e7eb;
      border-radius:10px;outline:none
    }
    button{
      margin-top:1rem;width:100%;padding:.9rem;border:0;border-radius:12px;
      background:#0f2f45;color:#fff;font-weight:600;cursor:pointer
    }
    a{color:#0f2f45;text-decoration:none}
    .muted{color:#64748b;font-size:.9rem}
    hr{border:0;border-top:1px solid #e5e7eb;margin:1.5rem 0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>เข้าสู่ระบบ</h1>

    <!-- ฟอร์ม Login -->
    <form id="loginForm">
      <label for="email">อีเมล</label>
      <input id="email" name="email" type="email" required />
      <label for="password">รหัสผ่าน</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Login</button>
    </form>

    <p class="muted" style="margin-top:.75rem">
      ถ้ายังไม่มีบัญชี ให้สมัครสมาชิกด้านล่าง
    </p>

    <hr>

    <!-- ฟอร์ม Register -->
    <h2>สมัครสมาชิกใหม่</h2>
    <form id="registerForm">
      <label for="r_fullname">ชื่อ-นามสกุล</label>
      <input id="r_fullname" name="full_name" required />
      <label for="r_email">อีเมล</label>
      <input id="r_email" name="email" type="email" required />
      <label for="r_password">รหัสผ่าน</label>
      <input id="r_password" name="password" type="password" required />
      <button type="submit">สมัครสมาชิก</button>
    </form>

    <p style="margin-top:1rem"><a href="Homepage.html">กลับหน้าแรก</a></p>
  </div>

  <script>
    function redirectAfterAuth(user){
      if(user && user.role === 'admin'){
        location.href = '/admin';
        return;
      }
      if(window.location.pathname === '/checkout'){
        location.href = '/checkout';
      }else{
        location.href = '/Homepage.html';
      }
    }

    // ----- LOGIN -----
    document.getElementById('loginForm')?.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try{
        const r = await fetch('/api/auth/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const js = await r.json();
        if(!r.ok){
          alert(js.message || 'เข้าสู่ระบบไม่สำเร็จ');
          return;
        }
        redirectAfterAuth(js.user);
      }catch(err){
        console.error(err);
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
      }
    });

    // ----- REGISTER -----
    document.getElementById('registerForm')?.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const full_name = document.getElementById('r_fullname').value.trim();
      const email = document.getElementById('r_email').value.trim();
      const password = document.getElementById('r_password').value;
      try{
        const r = await fetch('/api/auth/register',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ full_name, email, password })
        });
        const js = await r.json();
        if(!r.ok){
          alert(js.message || 'สมัครสมาชิกไม่สำเร็จ');
          return;
        }
        redirectAfterAuth(js.user);
      }catch(err){
        console.error(err);
        alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
      }
    });
  </script>
</body>
</html>
