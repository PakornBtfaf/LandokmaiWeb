<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>LANDOKMAI — Blogs</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body{font-family:Poppins,system-ui;margin:0;background:#f8fafc;color:#1e293b}
    .nav{display:flex;gap:12px;align-items:center;justify-content:space-between;background:#fff;padding:12px 16px;border-bottom:1px solid #e5e7eb}
    .wrap{max-width:900px;margin:20px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}
    .card img{width:100%;height:160px;object-fit:cover}
    .pad{padding:10px}
    a{color:#0f2f45;text-decoration:none}
  </style>
</head>
<body>
  <div class="nav">
    <div><a href="/">LANDOKMAI</a></div>
    <div><a href="/shop">Shop</a> · <a href="/blogs"><strong>Blogs</strong></a> · <a href="/login">Login</a></div>
  </div>

  <div class="wrap" id="listView" style="display:none">
    <h2>บทความล่าสุด</h2>
    <section id="list" class="grid"></section>
  </div>

  <div class="wrap" id="detailView" style="display:none">
    <a href="/blogs">← กลับหน้ารวม</a>
    <h1 id="d_title"></h1>
    <div id="d_meta" style="color:#64748b;margin-bottom:10px"></div>
    <img id="d_cover" style="width:100%;max-height:320px;object-fit:cover;border-radius:12px;display:none" />
    <article id="d_content" style="white-space:pre-wrap;margin-top:12px"></article>
  </div>

  <script>
    const q = new URL(location.href).searchParams;
    const slug = q.get('slug');

    if(slug){
      document.getElementById('detailView').style.display='block';
      fetch('/api/blogs/'+encodeURIComponent(slug))
        .then(r=>r.json())
        .then(p=>{
          if(p.message==='not_found'){ location.href='/blogs'; return; }
          d_title.textContent = p.title;
          d_meta.textContent = `โดย ${p.author} • เผยแพร่ ${new Date(p.created_at).toLocaleString()}`;
          if(p.cover_url){ d_cover.src = p.cover_url; d_cover.style.display='block'; }
          d_content.textContent = p.content;
        });
    }else{
      document.getElementById('listView').style.display='block';
      fetch('/api/blogs')
        .then(r=>r.json())
        .then(items=>{
          list.innerHTML = items.map(x=>`
            <a class="card" href="/blogs?slug=${encodeURIComponent(x.slug)}">
              ${x.cover_url?`<img src="${x.cover_url}" alt="">`:''}
              <div class="pad">
                <h3 style="margin:6px 0">${x.title}</h3>
                <div style="color:#64748b">โดย ${x.author} • ${new Date(x.created_at).toLocaleDateString()}</div>
              </div>
            </a>
          `).join('');
        });
    }
  </script>
</body>
</html>
