<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SuccessRegister — Landokmai</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{--brand:#0f2f45;--brand-2:#c9a06b;--text:#1e293b;--line:#e5e7eb}
    *{box-sizing:border-box} html,body{margin:0;font-family:Poppins,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
    .wrap{min-height:100dvh;display:grid;place-items:center;padding:24px;background:#fff}
    .card{max-width:560px;width:100%;border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.05);text-align:center}
    h1{margin:0 0 10px}
    p{margin:0 0 18px}
    .btn{display:inline-block;padding:12px 16px;border-radius:12px;border:1px solid var(--brand-2);color:#fff;background:var(--brand-2);font-weight:700;text-decoration:none}
    .logo{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:10px}
    .logo-badge{border:2px solid var(--brand-2);color:var(--brand-2);padding:6px 8px;border-radius:10px;font-size:13px;line-height:1;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">
        <span class="logo-badge">Landokmai<br>Flower</span>
        <strong>Landokmai</strong>
      </div>
      <h1>Successfully registered 🎉</h1>
      <p>Thank you for joining us.</p>
      <a class="btn" href="Homepage.html">&larr; กลับสู่หน้าแรก</a>
    </div>
  </div>
</body>
</html>
